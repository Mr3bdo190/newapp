<style>
        body { font-family: 'Hanken Grotesk', sans-serif; -webkit-tap-highlight-color: transparent; }

<body class="bg-background text-on-background min-h-screen antialiased selection:bg-primary-container selection:text-on-primary-container">

<h1 class="font-headline-sm text-headline-sm-mobile md:text-headline-sm text-on-surface">تعديل الملف الشخصي</h1>

</div>

</div>
<div class="absolute -bottom-2 -right-2 bg-primary w-8 h-8 rounded-full flex items-center justify-center shadow-lg border-2 border-white">
<span class="material-symbols-outlined text-white text-sm" style="font-variation-settings: 'FILL' 1;">edit</span>
</div>
</div>

</div>
<!-- Username Field -->
<div class="flex flex-col gap-unit relative mt-unit">

<input class="premium-input font-body-md text-body-md" dir="ltr" id="username" placeholder="اسم المستخدم" type="text" value="@sara_design"/>
</div>
<!-- Bio Field -->
<div class="flex flex-col gap-unit relative mt-unit">
