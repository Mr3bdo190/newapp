<!DOCTYPE html>

                        "display-lg": ["34px", { "lineHeight": "41px", "letterSpacing": "-0.02em", "fontWeight": "800" }]

                }
            }

<style>
        body { font-family: 'Hanken Grotesk', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .soft-shadow {
            box-shadow: 0px 8px 24px rgba(0, 0, 0, 0.04);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-container-lowest text-on-surface min-h-screen flex items-center justify-center relative overflow-hidden selection:bg-primary-container selection:text-on-primary-container">
<!-- Ambient Background Blobs for Glassmorphism Effect -->
<div class="absolute top-[-15%] right-[-10%] w-96 h-96 bg-primary-container/30 rounded-full blur-[80px] pointer-events-none"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-80 h-80 bg-tertiary-container/20 rounded-full blur-[60px] pointer-events-none"></div>
<main class="w-full max-w-md px-margin-page py-stack-lg z-10 flex flex-col items-center">
<!-- Header Section -->
<header class="w-full flex flex-col items-center mb-10 text-center">
<div class="w-20 h-20 rounded-full bg-surface-container-high flex items-center justify-center mb-stack-md soft-shadow border border-outline-variant/30">
<span class="material-symbols-outlined text-4xl text-primary" style="font-variation-settings: 'FILL' 1;">
                    all_inclusive
                </span>
</div>
<h1 class="font-display-lg-mobile text-display-lg-mobile text-on-surface mb-unit">أهلاً بك</h1>
<p class="font-body-md text-body-md text-on-surface-variant">سجل دخولك للمتابعة إلى حسابك</p>
</header>
<!-- Form Section -->
<form class="w-full flex flex-col gap-stack-md" onsubmit="event.preventDefault();">
<!-- Email Input -->
<div class="relative w-full">
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">
                    mail
                </span>
<input class="w-full glass-panel border border-outline-variant/50 rounded-xl py-4 pr-12 pl-4 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200 soft-shadow placeholder:text-outline" placeholder="البريد الإلكتروني" required="" type="email"/>
</div>
<!-- Password Input -->
<div class="relative w-full">
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">
                    lock
                </span>
<input class="w-full glass-panel border border-outline-variant/50 rounded-xl py-4 pr-12 pl-12 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200 soft-shadow placeholder:text-outline" id="password-input" placeholder="كلمة المرور" required="" type="password"/>
<button class="absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors focus:outline-none" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" id="visibility-icon">
                        visibility_off
                    </span>
</button>
</div>
<!-- Forgot Password Link -->
<div class="w-full flex justify-end px-2">
<a class="font-label-sm text-label-sm text-primary hover:text-primary-container transition-colors" href="#">هل نسيت كلمة المرور؟</a>
</div>
<!-- Action Buttons -->
<div class="flex flex-col gap-stack-sm mt-stack-sm">
<button class="w-full bg-primary text-on-primary py-4 rounded-full font-label-lg text-label-lg shadow-lg shadow-primary/20 hover:opacity-90 active:scale-[0.98] transition-all duration-200 flex justify-center items-center gap-2" type="submit">
                    تسجيل الدخول
                </button>
<button class="w-full bg-transparent border border-outline-variant text-on-surface py-4 rounded-full font-label-lg text-label-lg hover:bg-surface-container/50 active:scale-[0.98] transition-all duration-200" type="button">
                    إنشاء حساب جديد
                </button>
</div>
</form>
<!-- Social Login Section -->
<div class="w-full mt-10">
<div class="relative flex items-center justify-center mb-stack-md">
<div class="absolute w-full border-t border-outline-variant/40"></div>
<span class="relative bg-surface-container-lowest px-4 font-label-sm text-label-sm text-on-surface-variant">أو المتابعة باستخدام</span>
</div>
<div class="flex justify-center gap-stack-md">
<!-- Google Button -->
<button class="w-14 h-14 rounded-full border border-outline-variant/50 bg-white flex items-center justify-center hover:bg-surface-container transition-colors soft-shadow active:scale-95" type="button">
<svg fill="none" height="24" viewbox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25C22.56 11.47 22.49 10.72 22.36 10H12V14.26H17.92C17.67 15.63 16.89 16.79 15.72 17.57V20.31H19.28C21.36 18.39 22.56 15.58 22.56 12.25Z" fill="#4285F4"></path>
<path d="M12 23C14.97 23 17.46 22.02 19.28 20.31L15.72 17.57C14.73 18.23 13.48 18.64 12 18.64C9.13 18.64 6.7 16.7 5.82 14.12H2.15V16.96C3.96 20.55 7.69 23 12 23Z" fill="#34A853"></path>
<path d="M5.82 14.12C5.59 13.46 5.46 12.74 5.46 12C5.46 11.26 5.59 10.54 5.82 9.88V7.04H2.15C1.41 8.52 1 10.2 1 12C1 13.8 1.41 15.48 2.15 16.96L5.82 14.12Z" fill="#FBBC05"></path>
<path d="M12 5.36C13.62 5.36 15.06 5.92 16.2 7.01L19.35 3.86C17.45 2.09 14.97 1 12 1C7.69 1 3.96 3.45 2.15 7.04L5.82 9.88C6.7 7.3 9.13 5.36 12 5.36Z" fill="#EA4335"></path>
</svg>
</button>
<!-- Apple Button -->
<button class="w-14 h-14 rounded-full border border-outline-variant/50 bg-white flex items-center justify-center hover:bg-surface-container transition-colors soft-shadow active:scale-95 text-on-surface" type="button">
<svg fill="currentColor" height="24" viewbox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg">
<path d="M16.3648 7.42203C17.1818 6.43503 17.7271 5.09703 17.5756 3.75C16.4251 3.79603 14.9868 4.51603 14.1388 5.48803C13.3821 6.34503 12.7303 7.71203 12.9126 9.02903C14.1953 9.12703 15.5476 8.40903 16.3648 7.42203ZM17.4475 16.98C17.0683 18.113 15.3565 20.301 14.123 20.329C13.0645 20.353 12.6953 19.689 11.4533 19.689C10.2111 19.689 9.77161 20.301 8.79461 20.329C7.58554 20.353 5.97604 18.257 5.48904 17.53C4.28182 15.736 3.32832 12.569 4.31682 10.375C4.80582 9.29003 5.82904 8.58303 6.95354 8.55903C8.07732 8.53503 9.11704 9.31403 9.77161 9.31403C10.4253 9.31403 11.7161 8.35803 13.0483 8.52303C13.6068 8.54703 15.1848 8.74903 16.1953 10.245C16.1136 10.297 14.2851 11.365 14.3091 13.513C14.3331 15.986 16.3986 16.845 16.4475 16.868C16.4251 16.92 17.0683 18.113 17.4475 16.98Z"></path>
</svg>
</button>
</div>
</div>
</main>
<script>
        function togglePassword() {
            const input = document.getElementById('password-input');
            const icon = document.getElementById('visibility-icon');
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = 'visibility';
            } else {
                input.type = 'password';
                icon.textContent = 'visibility_off';
            }
        }
    </script>
</body></html>
