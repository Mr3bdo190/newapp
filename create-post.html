<style>
        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            background-color: theme('colors.background');
            -webkit-tap-highlight-color: transparent;
        }
        
        .hanken-font {
            font-family: 'Hanken Grotesk', sans-serif;
        }

        /* Glassmorphism Utilities */
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05);
        }
        
        /* Hide scrollbar for clean UI */
        ::-webkit-scrollbar {
            display: none;
        }

<style>

<body class="text-on-background min-h-screen flex flex-col pb-safe">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 bg-white/80 dark:bg-on-surface/80 backdrop-blur-xl flex justify-between items-center px-margin-page h-14 border-b border-secondary-fixed/50 dark:border-outline-variant/30">
<button class="text-on-surface-variant hover:opacity-70 transition-opacity active:scale-95 duration-150 flex items-center">
<span class="font-body-md text-body-md text-secondary">Cancel</span>
</button>
<h1 class="font-headline-sm text-headline-sm-mobile md:text-headline-sm text-on-surface text-center hanken-font">New Post</h1>
<button class="bg-neon-gradient text-white px-4 py-1.5 rounded-full font-label-lg text-label-lg hover:opacity-90 active:scale-95 transition-all shadow-[0_4px_12px_rgba(79,172,254,0.3)] hanken-font">
            Post
        </button>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow pt-16 pb-24 px-margin-page max-w-[600px] mx-auto w-full flex flex-col gap-stack-lg">
<!-- Media Upload Area (Glassmorphism) -->
<div class="glass-panel rounded-3xl aspect-square flex flex-col items-center justify-center cursor-pointer group relative overflow-hidden transition-all duration-300 hover:shadow-[0_12px_40px_rgba(79,172,254,0.15)] mt-stack-sm">
<div class="absolute inset-0 bg-gradient-to-br from-surface-container-low/50 to-surface-container/20"></div>
<div class="z-10 flex flex-col items-center gap-stack-sm text-primary transition-transform duration-300 group-hover:scale-110 group-active:scale-95">
<div class="w-16 h-16 rounded-full bg-primary/10 flex items-center justify-center mb-2">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 0;">add_photo_alternate</span>
</div>
<span class="font-label-lg text-label-lg hanken-font">Tap to add media</span>
</div>
<!-- Optional: Blurred decorative blob behind -->
<div class="absolute top-1/4 left-1/4 w-32 h-32 bg-cyan-400/20 rounded-full blur-3xl mix-blend-multiply"></div>
<div class="absolute bottom-1/4 right-1/4 w-32 h-32 bg-purple-400/20 rounded-full blur-3xl mix-blend-multiply"></div>
</div>
<!-- Caption Input -->
<div class="flex gap-gutter-grid items-start bg-white rounded-2xl p-stack-md border border-surface-container-highest shadow-sm">
<img alt="Profile" class="w-10 h-10 rounded-full object-cover shrink-0" data-alt="A close-up portrait of a young person with clear skin, looking directly at the camera. The lighting is soft and natural, emphasizing a clean, modern aesthetic suitable for a high-end social media platform. Bright, optimistic mood." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBXImPXiAqHuuCHs3_nZGaJ2bclyArJPS9alVkIG73lUWSll0XnaKOeNIyRVdBatRCAkYM8mXSyD-Sx-pj63ELP2pDB4KZnrMPn3QH6iEU63syXVEIdpWtDcoJnSJmDmKxjc8ekE7qCOzQkt4EK0u5L8KIe8wvfvA3ShXoneVtKMlVmFnRcYay6BKK8cy_I-ox3ke8cdFEYqlkByjZsS9Wua3YclptStWmQWGsl9IqCCSrXO18_JqatOIJkt89itbUmitlkPM4_xjw"/>
<textarea class="w-full bg-transparent border-none focus:ring-0 resize-none font-body-md text-body-md text-on-surface placeholder-secondary p-0 min-h-[80px]" placeholder="Write a caption..."></textarea>
</div>
<!-- Options List -->
<div class="bg-white rounded-2xl border border-surface-container-highest shadow-sm overflow-hidden">
<!-- Add Location -->
<button class="w-full flex items-center justify-between p-stack-md border-b border-surface-variant hover:bg-surface-container-low transition-colors active:bg-surface-container">
<div class="flex items-center gap-stack-md">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 0;">location_on</span>
<span class="font-body-md text-body-md text-on-surface">Add Location</span>
</div>
<span class="material-symbols-outlined text-outline-variant">chevron_right</span>
</button>
<!-- Tag People -->
<button class="w-full flex items-center justify-between p-stack-md border-b border-surface-variant hover:bg-surface-container-low transition-colors active:bg-surface-container">
<div class="flex items-center gap-stack-md">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 0;">person_add</span>
<span class="font-body-md text-body-md text-on-surface">Tag People</span>
</div>
<span class="material-symbols-outlined text-outline-variant">chevron_right</span>
</button>
<!-- Music -->
<button class="w-full flex items-center justify-between p-stack-md border-b border-surface-variant hover:bg-surface-container-low transition-colors active:bg-surface-container">
<div class="flex items-center gap-stack-md">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 0;">music_note</span>
<span class="font-body-md text-body-md text-on-surface">Add Music</span>
</div>
<span class="material-symbols-outlined text-outline-variant">chevron_right</span>
</button>
<!-- Advanced Settings -->
<button class="w-full flex items-center justify-between p-stack-md hover:bg-surface-container-low transition-colors active:bg-surface-container">
<div class="flex items-center gap-stack-md">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 0;">settings</span>
<span class="font-body-md text-body-md text-on-surface">Advanced Settings</span>
</div>
<span class="material-symbols-outlined text-outline-variant">chevron_right</span>
</button>
</div>

<nav class="md:hidden fixed bottom-0 w-full z-50 pb-safe bg-white/80 dark:bg-on-surface/80 backdrop-blur-xl flex justify-around items-center h-16 px-4 border-t border-secondary-fixed/50 dark:border-outline-variant/30 shadow-lg dark:shadow-none hanken-font">
<button class="flex flex-col items-center justify-center text-secondary dark:text-secondary-fixed-dim hover:bg-surface-container/30 dark:hover:bg-surface-container-highest/10 rounded-full active:scale-90 transition-all duration-200 w-12 h-12">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">home</span>
<span class="font-label-sm text-label-sm mt-1">Home</span>
</button>
<button class="flex flex-col items-center justify-center text-secondary dark:text-secondary-fixed-dim hover:bg-surface-container/30 dark:hover:bg-surface-container-highest/10 rounded-full active:scale-90 transition-all duration-200 w-12 h-12">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">search</span>
<span class="font-label-sm text-label-sm mt-1">Search</span>
</button>
<button class="flex flex-col items-center justify-center text-primary dark:text-inverse-primary scale-110 active:scale-90 transition-all duration-200 w-12 h-12 relative">
<div class="absolute inset-0 bg-primary/10 rounded-full scale-125 blur-sm"></div>
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">add_circle</span>

</button>
<button class="flex flex-col items-center justify-center text-secondary dark:text-secondary-fixed-dim hover:bg-surface-container/30 dark:hover:bg-surface-container-highest/10 rounded-full active:scale-90 transition-all duration-200 w-12 h-12">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">notifications</span>
<span class="font-label-sm text-label-sm mt-1">Alerts</span>
</button>
<button class="flex flex-col items-center justify-center text-secondary dark:text-secondary-fixed-dim hover:bg-surface-container/30 dark:hover:bg-surface-container-highest/10 rounded-full active:scale-90 transition-all duration-200 w-12 h-12">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">person</span>
<span class="font-label-sm text-label-sm mt-1">Profile</span>
</button>

<!-- JS for Textarea Auto-resize -->
<script>
        const textarea = document.querySelector('textarea');
        textarea.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });
    </script>
</body></html>
