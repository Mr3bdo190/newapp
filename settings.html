<style>
        /* Smooth scrolling and basic reset */
        html { scroll-behavior: smooth; }
        body { 
            -webkit-tap-highlight-color: transparent; 
            font-family: 'Hanken Grotesk', sans-serif; 
            background-color: theme('colors.background');
        }
        
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        .pt-safe { padding-top: env(safe-area-inset-top); }
        
        /* Material Symbols Customization */
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        /* Glassmorphism utilities */
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        
        .ios-list-item {
            position: relative;
        }
        .ios-list-item:not(:last-child)::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 56px; /* Matches RTL layout offset */
            height: 1px;
            background-color: #e2e2e2; /* surface-variant roughly */
        }

        .gradient-bg {
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
        }
        
        .story-ring {
            background: linear-gradient(45deg, #4facfe, #00f2fe, #4facfe);
            background-size: 200% 200%;
            animation: gradient-shift 3s ease infinite;
        }
        @keyframes gradient-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
